# Main configuration file for Mono3D
# This serves as the base config that all experiments inherit from

defaults:
  - data: pix3d
  - model: frontend
  - training: default
  - _self_

# Project metadata
project_name: mono3d_reconstruction
experiment_name: default
seed: 42

# Device configuration
device: cuda  # cuda or cpu
distributed:
  enabled: false
  backend: nccl
  world_size: 1
  rank: 0

# Mixed precision training
amp:
  enabled: true
  opt_level: O1

# Paths
paths:
  data_dir: data
  output_dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  checkpoint_dir: ${paths.output_dir}/checkpoints
  log_dir: ${paths.output_dir}/logs
  cache_dir: ${paths.data_dir}/cache

# Logging configuration
logging:
  level: INFO
  save_interval: 5  # Save checkpoint every N epochs
  log_interval: 10  # Log metrics every N iterations
  use_wandb: false
  wandb_project: mono3d
  wandb_entity: null
  use_tensorboard: true

# Hydra configuration
hydra:
  run:
    dir: ${paths.output_dir}
  sweep:
    dir: outputs/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: true