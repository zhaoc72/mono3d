# @package _global_

# ScanNet dataset configuration
data:
  name: scannet
  type: ScanNetDataset
  root: data/ScanNet
  
  # Version
  version: v2  # v1 or v2
  
  # Split configuration
  split:
    train: train
    val: val
    test: test
  
  # Scene types
  scene_types: null  # Use all scenes
  
  # Data loading
  batch_size: 4
  num_workers: 4
  pin_memory: true
  drop_last: true
  shuffle: true
  
  # Image configuration
  image:
    size: [480, 640]  # Keep original ScanNet resolution
    normalize: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  
  # Depth configuration
  depth:
    max_depth: 10.0  # meters
    use_colored_depth: false
  
  # Frame sampling
  frame:
    sample_interval: 10  # Sample every N frames
    max_frames_per_scene: 100
  
  # Point cloud
  pointcloud:
    num_points: 8192
    voxel_size: 0.05  # meters
    remove_ceiling: true
    remove_floor: false
  
  # Semantic segmentation (optional)
  semantic:
    enabled: false
    num_classes: 21
    use_nyu40_labels: true
  
  # Data augmentation
  augmentation:
    enabled: true
    random_flip: 0.5
    color_jitter:
      brightness: 0.2
      contrast: 0.2
  
  # Cache
  cache:
    enabled: false
    backend: lmdb
    features: [dino, depth, mask]