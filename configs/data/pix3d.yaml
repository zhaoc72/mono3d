# configs/data/pix3d.yaml
name: pix3d
root: ${paths.data_root}/Pix3D

# 数据划分
split:
  train: train
  val: val
  test: test

# 数据加载
batch_size: 16
shuffle: true
pin_memory: true
prefetch_factor: 2

# 图像预处理
image:
  size: [256, 256]                 # [H, W]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# 数据增强
augmentation:
  enabled: true
  random_flip: 0.5
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  random_crop: true

# 缓存配置
cache:
  enabled: true
  backend: lmdb                    # lmdb / pt / hdf5
  cache_dir: ${paths.cache_dir}/pix3d
  features: [dino, depth, mask]    # 需要缓存的特征

# 类别
categories:
  - chair
  - sofa
  - table
  - bed
  - desk
  - misc
  - tool
  - wardrobe
  - bookcase