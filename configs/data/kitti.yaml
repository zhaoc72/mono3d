# @package _global_

# KITTI dataset configuration
data:
  name: kitti
  type: KITTIDataset
  root: data/KITTI
  
  # Split configuration
  split:
    train: train
    val: val
    test: test
  
  # Subset
  subset: object  # object, raw, odometry
  
  # Data loading
  batch_size: 8
  num_workers: 4
  pin_memory: true
  drop_last: true
  shuffle: true
  
  # Image configuration
  image:
    size: [384, 1248]  # KITTI aspect ratio
    normalize: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  
  # Depth configuration
  depth:
    max_depth: 80.0  # meters (outdoor)
    use_lidar: true
    lidar_projection: true
  
  # Object detection (for object subset)
  object:
    classes: ["Car", "Pedestrian", "Cyclist"]
    min_height: 25  # pixels
    max_occlusion: 2
    max_truncation: 0.5
  
  # Camera
  camera:
    use_stereo: false
    baseline: 0.54  # meters
  
  # Point cloud
  pointcloud:
    num_points: 4096
    remove_ground: true
    crop_radius: 50.0  # meters
  
  # Data augmentation
  augmentation:
    enabled: true
    random_flip: 0.5
    random_crop: 0.9
    color_jitter:
      brightness: 0.2
      contrast: 0.2
  
  # Cache
  cache:
    enabled: false
    backend: pt
    features: [dino, depth]