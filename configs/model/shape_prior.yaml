# @package _global_

# Shape prior model configuration
model:
  shape_prior:
    type: implicit  # explicit or implicit
    
    # Explicit shape prior (template-based)
    explicit:
      num_templates: 10
      template_points: 2048
      deformation:
        method: mlp
        hidden_dims: [256, 512, 512, 256]
        output_dim: 3
    
    # Implicit shape prior (VAE/GAN)
    implicit:
      # Architecture
      architecture: vae  # vae, gan, diffusion
      
      # Encoder
      encoder:
        backbone: pointnet  # pointnet, pointnet++, dgcnn
        hidden_dims: [64, 128, 256, 512]
        global_pooling: max
        
      # Decoder
      decoder:
        type: mlp  # mlp, folding, implicit
        hidden_dims: [512, 512, 256, 128]
        output_points: 2048
        output_dim: 3
        
      # Latent space
      latent_dim: 128
      
      # VAE specific
      vae:
        beta: 0.001  # KLD weight
        kld_weight: 0.001
        
      # Training
      training:
        reconstruction_loss: chamfer  # chamfer, emd
        use_normal: false
        
      # Loss weights
      loss:
        reconstruction: 1.0
        kld: 0.001
        normal: 0.1
    
    # Pretrained weights
    pretrained: false
    weights_path: null