# @package _global_

# Frontend model configuration (combines DINOv3, SAM2, Depth)
model:
  frontend:
    # Component selection
    use_dinov3: true
    use_sam2: true
    use_depth: true
    
    # DINOv3 settings
    dinov3:
      variant: vitb14
      pretrained: true
      weights_path: checkpoints/pretrained/dinov3_vitb14_pretrain.pth
      output_dim: 768
      freeze: false
    
    # SAM2 settings
    sam2:
      variant: hiera_large
      pretrained: true
      weights_path: checkpoints/pretrained/sam2.1_hiera_large.pt
      multimask: false
    
    # Depth settings
    depth:
      variant: vitl
      encoder: vitl
      pretrained: true
      weights_path: checkpoints/pretrained/depth_anything_v2_vitl.pth
      max_depth: 10.0
    
    # Feature fusion
    fusion:
      method: concat  # concat, add, attention
      feature_dim: 768
      output_dim: 256
      
      # Fusion network
      network:
        hidden_dims: [512, 256]
        activation: relu
        dropout: 0.1
        norm: layer  # layer, batch, instance
    
    # Processing order
    pipeline:
      - dinov3
      - sam2
      - depth