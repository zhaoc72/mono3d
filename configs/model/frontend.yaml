# configs/model/frontend.yaml
name: frontend

# DINOv3 特征提取器
dinov3:
  name: dinov3
  backbone: vit_base_patch16_224
  weights: https://dl.fbaipublicfiles.com/dinov3/dinov3_vitb14_pretrain.pth
  frozen: true                     # 推理时冻结
  output_layers: [3, 7, 11]        # 多尺度特征

# SAM2 分割器
sam2:
  name: sam2
  model_size: large                # tiny / small / base / large
  weights: https://dl.fbaipublicfiles.com/segment_anything_2/sam2_hiera_large.pt
  frozen: true
  multimask_output: false

# Depth Anything 深度估计
depth:
  name: depth_anything
  encoder: vitl                    # vits / vitb / vitl
  weights: https://huggingface.co/depth-anything/Depth-Anything-V2-Large/resolve/main/depth_anything_v2_vitl.pth
  frozen: true
  max_depth: 10.0                  # 最大深度（米）

# Grounding DINO 检测器（可选）
detector:
  enabled: false
  name: grounding_dino
  weights: https://github.com/IDEA-Research/GroundingDINO/releases/download/v0.1.0-alpha/groundingdino_swint_ogc.pth
  text_threshold: 0.25
  box_threshold: 0.35