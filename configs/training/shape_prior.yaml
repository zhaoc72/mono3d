# @package _global_

# Shape prior training configuration
training:
  task: shape_prior
  
  epochs: 50
  
  optimizer:
    type: adam
    lr: 0.001
    weight_decay: 0.0
    
  scheduler:
    type: step
    step_size: 20
    gamma: 0.5
    
  # VAE specific
  vae:
    beta_schedule: constant  # constant, cyclic, linear
    beta_start: 0.0001
    beta_end: 0.001
    cycle_length: 10  # For cyclic
    
  # Training settings
  gradient_clip: 5.0
  accumulation_steps: 1
  
  validation:
    enabled: true
    interval: 2
    
  early_stopping:
    enabled: true
    patience: 10