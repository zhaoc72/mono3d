name: mono3d
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.9

  # PyTorch and CUDA
  - pytorch::pytorch=2.1.0
  - pytorch::torchvision=0.16.0
  - pytorch::torchaudio=2.1.0
  - pytorch::pytorch-cuda=12.1

  # Scientific computing
  - numpy=1.24.3
  - scipy=1.11.1
  - scikit-image=0.21.0
  - scikit-learn=1.3.0
  - pandas=2.0.3

  # Computer vision
  - opencv=4.8.0
  - pillow=10.0.0

  # Visualization
  - matplotlib=3.7.2
  - plotly=5.16.1

  # Configuration
  - pyyaml=6.0.1

  # Development tools
  - pip=23.2.1
  - jupyter=1.0.0
  - ipython=8.14.0

  # Pip dependencies
  - pip:
      # Configuration management
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      
      # Deep learning
      - timm==0.9.7
      - transformers==4.33.2
      - einops==0.6.1
      
      # 3D processing
      - trimesh==3.23.5
      - open3d==0.17.0
      - pymeshlab==2022.2.post4
      
      # Data storage
      - lmdb==1.4.1
      - h5py==3.9.0
      
      # Logging
      - tensorboard==2.14.0
      - wandb==0.15.10
      
      # Utilities
      - tqdm==4.66.1
      - rich==13.5.2
      
      # Testing
      - pytest==7.4.2
      - pytest-cov==4.1.0
      
      # Code quality
      - black==23.9.1
      - isort==5.12.0
      - flake8==6.1.0
      - mypy==1.5.1
      
      # Project-specific
      - imageio==2.31.3
      - imageio-ffmpeg==0.4.9